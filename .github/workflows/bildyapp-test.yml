name: BildyApp Tests

on:
  push:
    branches: [main]
    paths:
      - 'FINAL/bildyapp-api/**'
      - '.github/workflows/bildyapp-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'FINAL/bildyapp-api/**'
      - '.github/workflows/bildyapp-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FINAL/bildyapp-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: FINAL/bildyapp-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_DAYS: 7
