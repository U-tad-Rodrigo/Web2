services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - DB_URI=mongodb://mongo:27017/bildyapp
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  mongo:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  uploads:
